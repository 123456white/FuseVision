name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_DOWNLOADS: ${{ github.workspace }}/vcpkg/downloads
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/bincache
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg/bincache,readwrite"
  VCPKG_FEATURE_FLAGS: manifests

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Restore vcpkg tool cache
        id: cache-vcpkg-tool
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/.git
            vcpkg/.vcpkg-root
            vcpkg/.gitattributes
            vcpkg/.gitignore
            vcpkg/vcpkg.exe
            vcpkg/vcpkgmetricsuploader.exe
            vcpkg/bootstrap-vcpkg.bat
            vcpkg/bootstrap-vcpkg.sh
            vcpkg/scripts
            vcpkg/ports
            vcpkg/triplets
            vcpkg/versions
          key: vcpkg-tool-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-v3
          restore-keys: |
            vcpkg-tool-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-
            vcpkg-tool-${{ runner.os }}-

      - name: Clone vcpkg (if cache miss)
        if: steps.cache-vcpkg-tool.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force vcpkg -ErrorAction SilentlyContinue
          git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg

      - name: Bootstrap vcpkg (if cache miss)
        if: steps.cache-vcpkg-tool.outputs.cache-hit != 'true'
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Verify vcpkg tool cache integrity
        if: steps.cache-vcpkg-tool.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          $missing = @()
          if (-not (Test-Path "vcpkg/.vcpkg-root")) { $missing += ".vcpkg-root" }
          if (-not (Test-Path "vcpkg/vcpkg.exe"))   { $missing += "vcpkg.exe" }
          if (-not (Test-Path "vcpkg/scripts/buildsystems/vcpkg.cmake")) { $missing += "vcpkg.cmake" }
          if ($missing.Count -gt 0) {
            Write-Host "::warning::vcpkg tool cache corrupted. Re-cloning..."
            Remove-Item -Recurse -Force vcpkg -ErrorAction SilentlyContinue
            git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
            .\vcpkg\bootstrap-vcpkg.bat
          } else {
            Write-Host "vcpkg tool cache verified OK"
          }

      - name: Restore vcpkg binary cache
        id: cache-vcpkg-binary
        uses: actions/cache@v4
        with:
          path: vcpkg/bincache
          key: vcpkg-binary-${{ runner.os }}-x64-windows-${{ hashFiles('vcpkg.json') }}-v2
          restore-keys: |
            vcpkg-binary-${{ runner.os }}-x64-windows-

      - name: Ensure binary cache directory
        shell: pwsh
        run: |
          if (-not (Test-Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}")) {
            New-Item -ItemType Directory -Path "${{ env.VCPKG_DEFAULT_BINARY_CACHE }}" -Force | Out-Null
          }

      - name: Configure & Build (VS 2022 Native)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          choco install ninja --no-progress -y
          cmake --preset windows-x64-debug
          cmake --build --preset windows-debug --config Debug

      - name: Test (预留)
        if: false
        run: ctest --preset windows-debug --output-on-failure
        continue-on-error: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FuseVision-Windows-Debug
          path: out/build/windows-x64-debug/bin/Debug/
